                                                <i className="fas fa-search text-slate-400 text-xs"></i>
                                            </div>
                                            <input 
                                                type="text" 
                                                placeholder="Cari nama sekolah..." 
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="w-full pl-8 py-2 border border-slate-300 rounded-lg text-xs md:text-sm bg-slate-50 shadow-sm outline-none focus:border-blue-500 focus:bg-white transition-colors"
                                            />
                                        </div>

                                        <div className="flex flex-wrap md:flex-nowrap gap-2 w-full md:w-auto">
                                            {user?.role === 'dinas' && (
                                            <select value={filterKec} onChange={(e) => setFilterKec(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-xs md:text-sm bg-white shadow-sm flex-1 md:w-40 outline-none focus:border-blue-500">
                                                <option value="Semua">Kecamatan</option>
                                                {KECAMATAN_LIST.map(k => <option key={k} value={k}>{k}</option>)}
                                            </select>
                                            )}
                                            <select value={filterWaktu} onChange={(e) => setFilterWaktu(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-xs md:text-sm bg-white shadow-sm flex-1 md:w-32 outline-none focus:border-blue-500">
                                            <option value="Semua">Triwulan</option>
                                            {TRIWULAN_LIST.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                            <select value={filterJenjang} onChange={(e) => setFilterJenjang(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-xs md:text-sm bg-white shadow-sm flex-1 md:w-24 outline-none focus:border-blue-500">
                                            <option value="Semua">Jenjang</option>
                                            {JENJANG_LIST.map(j => <option key={j} value={j}>{j}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto pb-4 no-scrollbar">
                                {groupedData.length === 0 ? (
                                    <div className="p-8 text-center text-slate-500 bg-white rounded-xl border border-slate-200">
                                        <i className="fas fa-box-open text-3xl mb-2 text-slate-300"></i><br/>Data sekolah tidak ditemukan.
                                    </div>
                                ) : (
                                    groupedData.map(group => (
                                        <div key={group.sekolah} className="mb-4 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                            
                                            <div 
                                                className="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors"
                                                onClick={() => toggleSchool(group.sekolah)}
                                            >
                                                <div>
                                                    <h3 className="font-bold text-slate-800 text-sm md:text-base">{group.sekolah}</h3>
                                                    <p className="text-[10px] md:text-xs text-slate-500 mt-1">
                                                        <span className="bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200 mr-1">{group.jenjang}</span> 
                                                        <i className="fas fa-map-marker-alt text-red-400 mx-1"></i> {group.kecamatan} • 
                                                        <i className="fas fa-users text-blue-400 mx-1 ml-2"></i> {group.totalSiswa} Siswa • {group.records.length} Rombel Terinput
                                                    </p>
                                                </div>
                                                <div className={`text-slate-400 transform transition-transform duration-200 ${expandedSchool === group.sekolah ? 'rotate-180' : ''}`}>
                                                    <i className="fas fa-chevron-down"></i>
                                                </div>
                                            </div>

                                            {expandedSchool === group.sekolah && (
                                                <div className="border-t border-slate-100 bg-slate-50 p-0 overflow-x-auto no-scrollbar">
                                                    <table className="w-full text-left border-collapse text-xs whitespace-nowrap min-w-[1200px]">
                                                        <thead className="bg-slate-100 text-slate-600">
                                                            <tr>
                                                                <th className="p-3 border-b font-semibold">Periode</th>
                                                                <th className="p-3 border-b font-semibold">Kelas</th>
                                                                <th className="p-3 border-b font-semibold text-center" title="Jumlah Siswa">Siswa</th>
                                                                <th className="p-3 border-b font-semibold bg-blue-50/50 text-center">Literasi</th>
                                                                <th className="p-3 border-b font-semibold bg-indigo-50/50 text-center">Numerasi</th>
                                                                <th className="p-3 border-b font-semibold bg-amber-50/50 text-center">Karakter</th>
                                                                <th className="p-3 border-b font-semibold text-center">Keamanan</th>
                                                                <th className="p-3 border-b font-semibold text-center">Kebhinekaan</th>
                                                                <th className="p-3 border-b font-semibold text-center">Inklusivitas</th>
                                                                <th className="p-3 border-b font-semibold text-center">Pembelajaran</th>
                                                                <th className="p-3 border-b font-semibold text-center">Refleksi</th>
                                                                <th className="p-3 border-b font-semibold text-center">Kepemimpinan</th>
                                                                <th className="p-3 border-b font-semibold">Tautan Bukti</th>
                                                                <th className="p-3 border-b font-semibold text-center">Hapus</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {group.records.map((row) => {
                                                                const metrics = calculateMetrics(row);
                                                                return (
                                                                    <tr key={row.id} className="hover:bg-white border-b border-slate-100 transition-colors">
                                                                        <td className="p-3 text-slate-600 font-medium">
                                                                            {row.triwulan}<br/>
                                                                            <span className="text-[9px] text-slate-400">{row.tahunAjaran}</span>
                                                                        </td>
                                                                        <td className="p-3 font-semibold text-slate-800">{row.kelas} <span className="font-normal text-slate-500"><br/>Ruang {row.rombel}</span></td>
                                                                        <td className="p-3 text-center font-bold text-slate-700">{row.jumlahSiswa}</td>
                                                                        
                                                                        <td className="p-2 text-center bg-blue-50/20">
                                                                            <div className="font-semibold text-blue-800">{metrics.litRaw}/{row.jumlahSiswa}</div>
                                                                            <div className="text-[9px] md:text-[10px] bg-blue-100 inline-block px-1.5 rounded text-blue-700">{metrics.litPct}%</div>
                                                                        </td>
                                                                        <td className="p-2 text-center bg-indigo-50/20">
                                                                            <div className="font-semibold text-indigo-800">{metrics.numRaw}/{row.jumlahSiswa}</div>
                                                                            <div className="text-[9px] md:text-[10px] bg-indigo-100 inline-block px-1.5 rounded text-indigo-700">{metrics.numPct}%</div>
                                                                        </td>
                                                                        <td className="p-2 text-center bg-amber-50/20">
                                                                            <div className="font-semibold text-amber-800">{metrics.karRaw}/{row.jumlahSiswa * 3}</div>
                                                                            <div className="text-[9px] md:text-[10px] bg-amber-100 inline-block px-1.5 rounded text-amber-700">{metrics.karPct}%</div>
                                                                        </td>
                                                                        
                                                                        <td className="p-2 align-middle">
                                                                            <div className="flex flex-col items-center justify-center gap-1 mt-1">
                                                                                <ScoreBadge score={metrics.secScore} max={3} />
                                                                                <span className="text-[9px] md:text-[10px] text-slate-400 font-semibold">{metrics.secPct}%</span>
                                                                            </div>
                                                                        </td>
                                                                        <td className="p-2 align-middle">
                                                                            <div className="flex flex-col items-center justify-center gap-1 mt-1">
                                                                                <ScoreBadge score={metrics.divScore} max={3} />
                                                                                <span className="text-[9px] md:text-[10px] text-slate-400 font-semibold">{metrics.divPct}%</span>
                                                                            </div>
                                                                        </td>
                                                                        <td className="p-2 align-middle">
                                                                            <div className="flex flex-col items-center justify-center gap-1 mt-1">
                                                                                <ScoreBadge score={metrics.incScore} max={3} />
                                                                                <span className="text-[9px] md:text-[10px] text-slate-400 font-semibold">{metrics.incPct}%</span>
                                                                            </div>
                                                                        </td>
                                                                        <td className="p-2 align-middle">
                                                                            <div className="flex flex-col items-center justify-center gap-1 mt-1">
                                                                                <ScoreBadge score={metrics.belScore} max={3} />
                                                                                <span className="text-[9px] md:text-[10px] text-slate-400 font-semibold">{metrics.belPct}%</span>
                                                                            </div>
                                                                        </td>
                                                                        <td className="p-2 align-middle">
                                                                            <div className="flex flex-col items-center justify-center gap-1 mt-1">
                                                                                <ScoreBadge score={metrics.refScore} max={3} />
                                                                                <span className="text-[9px] md:text-[10px] text-slate-400 font-semibold">{metrics.refPct}%</span>
                                                                            </div>
                                                                        </td>
                                                                        <td className="p-2 align-middle">
                                                                            <div className="flex flex-col items-center justify-center gap-1 mt-1">
                                                                                <ScoreBadge score={metrics.pimScore} max={3} />
                                                                                <span className="text-[9px] md:text-[10px] text-slate-400 font-semibold">{metrics.pimPct}%</span>
                                                                            </div>
                                                                        </td>
                                                                        
                                                                        <td className="p-3 align-middle">
                                                                            {row.tautan_bukti ? (
                                                                                <a href={row.tautan_bukti} target="_blank" className="text-blue-600 hover:underline flex items-center gap-1"><i className="fas fa-link"></i> Buka Link</a>
                                                                            ) : <span className="text-slate-400">-</span>}
                                                                        </td>
                                                                        <td className="p-3 text-center align-middle">
                                                                            <button onClick={() => onDelete(row.id)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors" title="Hapus Data"><i className="fas fa-trash-alt"></i></button>
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        // max score dinamis, sekarang 3
        function ScoreBadge({ score, max = 5 }) {
            const num = Number(score);
            let color = num >= Math.ceil(max*0.8) ? 'bg-emerald-100 text-emerald-700' : num >= Math.ceil(max*0.5) ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700';
            return <span className={`inline-block w-5 h-5 md:w-6 md:h-6 leading-5 md:leading-6 text-center rounded-full font-bold text-[9px] md:text-[10px] ${color}`}>{num}</span>;
        }

        function Laporan({ records, user }) {
            const [filterKec, setFilterKec] = useState('Semua');
            const [filterSekolah, setFilterSekolah] = useState(user?.role === 'sekolah' ? user.sekolah : 'Semua');
            const [filterTriwulan, setFilterTriwulan] = useState('Semua');
            const [printType, setPrintType] = useState('rekap');

            const [blankKelas, setBlankKelas] = useState(KELAS_LIST[0]);
            const [blankTriwulan, setBlankTriwulan] = useState(TRIWULAN_LIST[0]);

            const uniqueSekolahList = useMemo(() => {
                const list = records.filter(r => filterKec === 'Semua' || r.kecamatan === filterKec).map(r => r.sekolah);
                return [...new Set(list)].sort();
            }, [records, filterKec]);

            const filteredRecords = useMemo(() => {
                return records.filter(r => {
                    return (filterKec === 'Semua' || r.kecamatan === filterKec) &&
                           (filterSekolah === 'Semua' || r.sekolah === filterSekolah) &&
                           (filterTriwulan === 'Semua' || r.triwulan === filterTriwulan);
                });
            }, [records, filterKec, filterSekolah, filterTriwulan]);

            const blankRecord = {
                id: 'blank', tahunAjaran: "....................", sekolah: "...........................................", namaKepsek: "", namaGuru: "",
                jenjang: "SD / SMP", kecamatan: "....................", 
                triwulan: blankTriwulan, kelas: blankKelas, 
                rombel: "..........", jumlahSiswa: ".......",
                materi_literasi: MATERI_LITERASI[blankKelas]?.[blankTriwulan] || "-", 
                materi_numerasi: MATERI_NUMERASI[blankKelas]?.[blankTriwulan] || "-",
                tuntas_literasi: ".......", tuntas_numerasi: ".......", karakter_teratur: ".......", karakter_pantang_menyerah: ".......", karakter_mandiri: ".......",
                k_aman_1: 0, k_aman_2: 0, k_aman_3: 0, k_bineka_1: 0, k_bineka_2: 0, k_bineka_3: 0, k_inklusif_1: 0, k_inklusif_2: 0, k_inklusif_3: 0,
                k_belajar_1: 0, k_belajar_2: 0, k_belajar_3: 0, k_refleksi_1: 0, k_refleksi_2: 0, k_refleksi_3: 0, k_pimpin_1: 0, k_pimpin_2: 0, k_pimpin_3: 0,
                tautan_bukti: "", catatan: ""
            };

            const recordsToPrint = printType === 'blank' ? [blankRecord] : filteredRecords;

            const handleExportExcel = () => {
                if(records.length === 0) return alert('Tidak ada data.');
                const headers = [
                    "ID", "Tahun Ajaran", "Sekolah", "Kecamatan", "Jenjang", "Kelas", "Rombel", "Triwulan", 
                    "Jumlah Siswa", "Nama Kepala Sekolah", "Nama Guru Kelas",
                    "Tuntas Literasi (Siswa)", "Persentase Literasi (%)",
                    "Tuntas Numerasi (Siswa)", "Persentase Numerasi (%)",
                    "Skor Keamanan (Max 3)", "Persentase Keamanan (%)",
                    "Skor Kebinekaan (Max 3)", "Persentase Kebinekaan (%)",
                    "Skor Inklusif (Max 3)", "Persentase Inklusif (%)",
                    "Skor Pembelajaran (Max 3)", "Persentase Pembelajaran (%)",
                    "Skor Refleksi (Max 3)", "Persentase Refleksi (%)",
                    "Skor Kepemimpinan (Max 3)", "Persentase Kepemimpinan (%)",
                    "Karakter Teratur (Siswa)", "Persentase Karakter Teratur (%)",
                    "Karakter Pantang Menyerah (Siswa)", "Persentase Pantang Menyerah (%)",
                    "Karakter Mandiri (Siswa)", "Persentase Mandiri (%)",
                    "Link Bukti Dukung", "Catatan"
                ];

                const rows = records.map(r => {
                    const siswa = Number(r.jumlahSiswa) || 0;

                    const litRaw = Number(r.tuntas_literasi || r.capaiLiterasi || 0);
                    const numRaw = Number(r.tuntas_numerasi || r.capaiNumerasi || 0);
                    const litPct = siswa ? Math.round((litRaw / siswa) * 100) : 0;
                    const numPct = siswa ? Math.round((numRaw / siswa) * 100) : 0;

                    const secScore = Number(r.k_aman_1||0) + Number(r.k_aman_2||0) + Number(r.k_aman_3||0) || Number(r.keamanan||0);
                    const divScore = Number(r.k_bineka_1||0) + Number(r.k_bineka_2||0) + Number(r.k_bineka_3||0) || Number(r.kebinekaan||0);
                    const incScore = Number(r.k_inklusif_1||0) + Number(r.k_inklusif_2||0) + Number(r.k_inklusif_3||0) || Number(r.inklusivitas||0);
                    const belScore = Number(r.k_belajar_1||0) + Number(r.k_belajar_2||0) + Number(r.k_belajar_3||0);
                    const refScore = Number(r.k_refleksi_1||0) + Number(r.k_refleksi_2||0) + Number(r.k_refleksi_3||0);
                    const pimScore = Number(r.k_pimpin_1||0) + Number(r.k_pimpin_2||0) + Number(r.k_pimpin_3||0);

                    const secPct = Math.round((secScore / 3) * 100) || 0;
                    const divPct = Math.round((divScore / 3) * 100) || 0;
                    const incPct = Math.round((incScore / 3) * 100) || 0;
                    const belPct = Math.round((belScore / 3) * 100) || 0;
                    const refPct = Math.round((refScore / 3) * 100) || 0;
                    const pimPct = Math.round((pimScore / 3) * 100) || 0;

                    const karTeratur = Number(r.karakter_teratur || 0);
                    const karPantang = Number(r.karakter_pantang_menyerah || 0);
                    const karMandiri = Number(r.karakter_mandiri || 0);

                    const pctTeratur = siswa ? Math.round((karTeratur / siswa) * 100) : 0;
                    const pctPantang = siswa ? Math.round((karPantang / siswa) * 100) : 0;
                    const pctMandiri = siswa ? Math.round((karMandiri / siswa) * 100) : 0;

                    return [
                        r.id, r.tahunAjaran||"-", r.sekolah, r.kecamatan, r.jenjang, r.kelas, r.rombel, r.triwulan, 
                        siswa, `"${r.namaKepsek || '-'}"`, `"${r.namaGuru || '-'}"`,
                        litRaw, litPct,
                        numRaw, numPct,
                        secScore, secPct,
                        divScore, divPct,
                        incScore, incPct,
                        belScore, belPct,
                        refScore, refPct,
                        pimScore, pimPct,
                        karTeratur, pctTeratur,
                        karPantang, pctPantang,
                        karMandiri, pctMandiri,
                        r.tautan_bukti || '', r.catatan || ''
                    ];
                });

                const worksheet = window.XLSX.utils.aoa_to_sheet([headers, ...rows]);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "Data_MONEV");
                window.XLSX.writeFile(workbook, `Laporan_MONEV_${new Date().getTime()}.xlsx`);
            };

            const doPrint = (type) => {
                if (type === 'detail' && filteredRecords.length === 0) {
                    alert('Tidak ada data rombel yang sesuai dengan filter.'); return;
                }
                setPrintType(type);
                setTimeout(() => window.print(), 100);
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6 relative">
                    <div className="bg-white p-6 md:p-8 rounded-xl border border-slate-200 shadow-sm text-center">
                        <div className="bg-blue-100 w-12 h-12 md:w-16 md:h-16 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fas fa-download text-blue-600 text-xl md:text-2xl"></i></div>
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Pusat Unduhan Laporan & Instrumen</h2>
                        <p className="text-xs md:text-sm text-slate-500 mb-6 md:mb-8 max-w-lg mx-auto">Unduh rekapitulasi data atau cetak dokumen instrumen kosong & detail per rombongan belajar.</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                            
                            {/* Card Cetak Blanko Kosong (Hanya Muncul Untuk Sekolah) */}
                            {user?.role === 'sekolah' && (
                                <div className="border border-amber-200 bg-amber-50/30 p-5 rounded-2xl text-left md:col-span-2 shadow-sm">
                                    <div className="flex justify-between items-center mb-1">
                                        <h3 className="font-bold text-base md:text-lg text-amber-900">Unduh Format Instrumen Kosong</h3>
                                    </div>
                                    <p className="text-xs text-slate-600 mb-4">Cetak formulir instrumen kosong untuk diisi secara manual oleh guru sebelum diinput ke dalam sistem.</p>
                                    
                                    <div className="flex flex-wrap gap-2 mb-4 bg-white p-3 rounded-lg border border-amber-200">
                                        <select value={blankKelas} onChange={(e) => setBlankKelas(e.target.value)} className="p-2 border border-slate-300 rounded text-xs text-slate-700 flex-1 min-w-[120px] outline-none focus:border-amber-500 cursor-pointer">
                                            {KELAS_LIST.map(k => <option key={k} value={k}>{k}</option>)}
                                        </select>
                                        <select value={blankTriwulan} onChange={(e) => setBlankTriwulan(e.target.value)} className="p-2 border border-slate-300 rounded text-xs text-slate-700 flex-1 min-w-[120px] outline-none focus:border-amber-500 cursor-pointer">
                                            {TRIWULAN_LIST.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>

                                    <button onClick={() => doPrint('blank')} className="w-full bg-amber-600 text-white py-2.5 rounded-lg text-xs md:text-sm font-bold hover:bg-amber-700 flex items-center justify-center gap-2 shadow-sm transition-transform hover:-translate-y-0.5">
                                        <i className="fas fa-file-pdf"></i> Cetak Formulir Kosong
                                    </button>
                                </div>
                            )}

                            <div className="border border-emerald-200 bg-emerald-50/30 p-5 rounded-2xl text-left md:col-span-2 shadow-sm">
                                <div className="flex justify-between items-center mb-1">
                                    <h3 className="font-bold text-base md:text-lg text-emerald-900">Cetak Detail Instrumen (Sesuai Format Docx)</h3>
                                </div>
                                <p className="text-xs text-slate-600 mb-4">Cetak halaman evaluasi detail yang sudah terisi, terpisah per halaman untuk masing-masing rombel.</p>
                                
                                <div className="flex flex-wrap gap-2 mb-4 bg-white p-3 rounded-lg border border-slate-200">
                                    {user?.role === 'dinas' && (
                                        <select value={filterKec} onChange={(e) => {setFilterKec(e.target.value); setFilterSekolah('Semua');}} className="p-2 border border-slate-300 rounded text-xs text-slate-700 flex-1 min-w-[120px] outline-none">
                                            <option value="Semua">Semua Kecamatan</option>
                                            {KECAMATAN_LIST.map(k => <option key={k} value={k}>{k}</option>)}
                                        </select>
                                    )}
                                    
                                    {user?.role === 'sekolah' ? (
                                        <input type="text" disabled value={user.sekolah} className="p-2 border border-slate-300 rounded text-xs text-slate-500 flex-1 min-w-[120px] bg-slate-100 cursor-not-allowed font-semibold" />
                                    ) : (
                                        <select value={filterSekolah} onChange={(e) => setFilterSekolah(e.target.value)} className="p-2 border border-slate-300 rounded text-xs text-slate-700 flex-1 min-w-[120px] outline-none">
                                            <option value="Semua">Semua Sekolah</option>
                                            {uniqueSekolahList.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    )}

                                    <select value={filterTriwulan} onChange={(e) => setFilterTriwulan(e.target.value)} className="p-2 border border-slate-300 rounded text-xs text-slate-700 flex-1 min-w-[120px] outline-none">
                                        <option value="Semua">Semua Triwulan</option>
                                        {TRIWULAN_LIST.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>

                                <button onClick={() => doPrint('detail')} className="w-full bg-emerald-600 text-white py-2.5 rounded-lg text-xs md:text-sm font-bold hover:bg-emerald-700 flex items-center justify-center gap-2 shadow-sm transition-transform hover:-translate-y-0.5">
                                    <i className="fas fa-file-pdf"></i> Cetak Instrumen Terisi ({filteredRecords.length} Rombel)
                                </button>
                            </div>

                            <div className="border border-blue-200 bg-blue-50/30 p-5 rounded-2xl text-left md:col-span-2">

        function KelolaPengguna({ showToast, GOOGLE_SCRIPT_URL }) {
            const [activeTab, setActiveTab] = useState('sekolah');

            const handleSubmit = async (e) => { 
                e.preventDefault(); 
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const action = activeTab === 'sekolah' ? 'add_npsn' : 'add_user';
                
                if (activeTab !== 'sekolah') data.role = activeTab === 'admin' ? 'dinas' : activeTab;

                if (GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== "MASUKKAN_LINK_APPS_SCRIPT_ANDA_DI_SINI") {
                    showToast('Menyimpan ke server...', 'info');
                    try {
                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action, data })
                        });
                        showToast('Data berhasil ditambahkan!');
                        e.target.reset();
                    } catch (error) {
                        showToast('Gagal mengirim ke server.', 'error');
                    }
                } else {
                    showToast('Link Apps Script belum diisi!', 'error');
                }
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6">
                <div className="bg-white p-5 md:p-6 rounded-2xl border border-slate-100 shadow-sm">
                    <div className="flex items-center gap-3 mb-4 md:mb-6 pb-4 border-b border-slate-100">
                    <div className="bg-blue-100 p-2 rounded-lg"><i className="fas fa-cog text-blue-600 text-xl"></i></div>
                    <div><h2 className="text-lg md:text-xl font-bold text-slate-800">Pengaturan Sistem</h2><p className="text-xs md:text-sm text-slate-500">Kelola pengguna sistem MONEV.</p></div>
                    </div>
                    <div className="flex border-b border-slate-200 mb-6 overflow-x-auto no-scrollbar">
                    <button type="button" onClick={() => setActiveTab('sekolah')} className={`px-4 py-2 text-xs md:text-sm font-semibold border-b-2 whitespace-nowrap transition-colors ${activeTab === 'sekolah' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>+ NPSN</button>
                    <button type="button" onClick={() => setActiveTab('korwil')} className={`px-4 py-2 text-xs md:text-sm font-semibold border-b-2 whitespace-nowrap transition-colors ${activeTab === 'korwil' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>+ Korwil</button>
                    <button type="button" onClick={() => setActiveTab('admin')} className={`px-4 py-2 text-xs md:text-sm font-semibold border-b-2 whitespace-nowrap transition-colors ${activeTab === 'admin' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>+ Admin</button>
                    </div>
                    <form onSubmit={handleSubmit} className="max-w-2xl space-y-4 md:space-y-5">
                    {activeTab === 'sekolah' && (<>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <InputGroup label="NPSN"><input type="text" name="npsn" required className="form-input" placeholder="8 digit NPSN" /></InputGroup>
                            <InputGroup label="Kecamatan"><select name="kecamatan" required className="form-select"><option value="">-- Pilih Kecamatan --</option>{KECAMATAN_LIST.map(k => <option key={k} value={k}>{k}</option>)}</select></InputGroup>
                        </div>
                        <InputGroup label="Nama Sekolah"><input type="text" name="sekolah" required className="form-input" placeholder="SDN 1..." /></InputGroup>
                    </>)}
                    {activeTab === 'korwil' && (<>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <InputGroup label="Kecamatan"><select name="kecamatan" required className="form-select"><option value="">-- Pilih Kecamatan --</option>{KECAMATAN_LIST.map(k => <option key={k} value={k}>{k}</option>)}</select></InputGroup>
                            <InputGroup label="Nama PIC"><input type="text" name="nama" required className="form-input" placeholder="Nama Lengkap" /></InputGroup>
                        </div>
                        <InputGroup label="Username"><input type="text" name="username" required className="form-input" /></InputGroup>
                        <InputGroup label="Password"><input type="password" name="password" required className="form-input" /></InputGroup>
                    </>)}
                    {activeTab === 'admin' && (<>
                        <InputGroup label="Nama Lengkap Admin"><input type="text" name="nama" required className="form-input" /></InputGroup>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <InputGroup label="Username"><input type="text" name="username" required className="form-input" /></InputGroup>
                            <InputGroup label="Password"><input type="password" name="password" required className="form-input" /></InputGroup>
                        </div>
                    </>)}
                    <button type="submit" className="w-full md:w-auto bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 md:py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 mt-2"><i className="fas fa-user-plus"></i> Simpan Pengguna</button>
                    </form>
                </div>
                </div>
            );
        }

        // --- LOGIN COMPONENT ---
        function Login({ onLogin, npsnDB, usersDB, isLoading }) {
            const [role, setRole] = useState('sekolah');
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [npsn, setNpsn] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                
                if (isLoading) { 
                    alert("Sedang memuat data dari server, mohon tunggu sebentar..."); 
                    return; 
                }

                if (role === 'sekolah') {
                    if (!npsn.trim()) { alert('Mohon masukkan NPSN!'); return; }
                    const schoolData = npsnDB[npsn];
                    if (!schoolData) { alert('NPSN tidak terdaftar di sistem! Pastikan Dinas sudah mendaftarkan NPSN Anda.'); return; }
                    
                    onLogin({ role, name: schoolData.sekolah, sekolah: schoolData.sekolah, kecamatan: schoolData.kecamatan });
                    return;
                }

                if (!username.trim() || !password.trim()) { 
                    alert('Mohon masukkan Username dan Password Anda!'); 
                    return; 
                }

                if (usersDB.length === 0 && GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== "MASUKKAN_LINK_APPS_SCRIPT_ANDA_DI_SINI") {
                    alert("Gagal Login: Data akun tidak ditemukan!\n\nPENTING: Jika Anda baru saja memperbarui Google Apps Script, Anda WAJIB melakukan 'Terapkan > Deployment Baru' (New Deployment). Jika tidak, sistem akan tetap membaca versi lama yang belum memiliki tabel Users.");
                    return;
                }

                const validUser = usersDB.find(u => {
                    const dbUser = String(u.username || '').trim().toLowerCase();
                    const dbPass = String(u.password || '').trim();
                    const dbRole = String(u.role || '').trim().toLowerCase();
                    
                    return dbUser === username.trim().toLowerCase() && 
                           dbPass === password.trim() && 
                           dbRole === role;
                });

                if (!validUser) { 
                    alert(`Gagal Login: Akun untuk Username '${username}' dan Role '${role === 'korwil' ? 'Korwil' : 'Dinas'}' tidak ditemukan, atau Password salah.\n\nPastikan data sudah tersimpan di Google Sheets dan Anda sudah refresh halaman.`); 
                    return; 
                }
                
                onLogin({ 
                    role: validUser.role, 
                    name: validUser.nama || validUser.username, 
                    kecamatan: validUser.role === 'korwil' ? validUser.kecamatan : null, 
                    sekolah: null 
                });
            };

            return (
                <div className="min-h-screen flex bg-gradient-to-br from-slate-900 via-blue-950 to-indigo-950 overflow-hidden relative">
                <style>{`
                    @keyframes slideInRight { 0% { transform: translateX(100vw) scale(0.9); opacity: 0; } 70% { transform: translateX(-20px) scale(1.02); opacity: 1; } 100% { transform: translateX(0) scale(1); opacity: 1; } }
                    @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
                    @keyframes float-img { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
                    .animate-slide-in { animation: slideInRight 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
                    .animate-blob { animation: blob 15s infinite alternate ease-in-out; }
                    .animate-float-img { animation: float-img 6s ease-in-out infinite; }
                    .animation-delay-2000 { animation-delay: 2s; } .animation-delay-4000 { animation-delay: 4s; }
                    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
                    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
                `}</style>
                <div className="absolute top-0 left-1/4 w-72 h-72 md:w-96 md:h-96 bg-blue-500/30 rounded-full mix-blend-screen filter blur-[80px] animate-blob pointer-events-none"></div>
                <div className="absolute top-1/4 right-1/4 w-72 h-72 md:w-96 md:h-96 bg-indigo-500/30 rounded-full mix-blend-screen filter blur-[80px] animate-blob animation-delay-2000 pointer-events-none"></div>
                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-30 mix-blend-overlay pointer-events-none"></div>

                <div className="flex w-full h-full relative z-10">
                    {/* Bagian Kiri: Form Login */}
                    <div className="w-full md:w-1/2 flex items-center justify-center p-4">
                        <div className="relative z-10 bg-white/95 backdrop-blur-xl max-w-md w-full rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden border border-white/20 animate-slide-in flex flex-col max-h-[95vh]">
                            
                            <div className="bg-gradient-to-r from-blue-700 to-indigo-800 p-5 md:p-6 text-center shadow-[inset_0_-10px_20px_rgba(0,0,0,0.2)] relative overflow-hidden flex-shrink-0">
                                <div className="relative z-10 bg-white p-2 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 shadow-[0_5px_15px_rgba(0,0,0,0.4)]">
                                    <img src="https://i.ibb.co.com/5xhN0cm1/Logo-Donggala.png" alt="Logo Donggala" className="w-10 h-10 object-contain" />
                                </div>
                                <h1 className="relative z-10 text-xl md:text-2xl font-extrabold text-white mb-1 drop-shadow-md tracking-wide">Portal MONEV</h1>
                                <p className="relative z-10 text-blue-100 text-xs md:text-sm font-medium opacity-90">Sistem Monitoring dan Evaluasi Pendidikan<br/>Kabupaten Donggala</p>
                            </div>
                            
                            <div className="overflow-y-auto no-scrollbar p-6">
                                <form onSubmit={handleSubmit} className="space-y-4 md:space-y-5">
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Pilih Peran Akun</label>
                                        <select value={role} onChange={(e) => { setRole(e.target.value); setNpsn(''); setUsername(''); setPassword(''); }} className="w-full p-3 rounded-lg border border-slate-300 bg-slate-50 outline-none shadow-sm focus:border-blue-500 text-sm">
                                        <option value="sekolah">Admin Sekolah (Operator)</option>
                                        <option value="korwil">Korwil Kecamatan</option>
                                        <option value="dinas">Admin Dinas / Superadmin</option>
                                        </select>
                                    </div>
                                    
                                    {role === 'sekolah' ? (
                                        <div className="animate-fade-in">
                                            <label className="block text-sm font-semibold text-slate-700 mb-1.5">NPSN Sekolah</label>
                                            <input type="text" value={npsn} onChange={(e) => setNpsn(e.target.value)} placeholder="Masukkan 8 Digit NPSN" className="w-full p-3 rounded-lg border border-slate-300 bg-slate-50 outline-none shadow-sm focus:border-blue-500 text-sm" />
                                            {isLoading && <div className="text-[10px] text-slate-500 mt-2 bg-slate-100 p-2 rounded border border-slate-200"><i className="fas fa-spinner fa-spin text-blue-600"></i> Menyinkronkan Data Sheet...</div>}
                                        </div>
                                    ) : (
                                        <div className="animate-fade-in space-y-4">
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                                                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} placeholder="Masukkan Username" className="w-full p-3 rounded-lg border border-slate-300 bg-slate-50 outline-none shadow-sm focus:border-blue-500 text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Kata Sandi (Password)</label>
                                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" className="w-full p-3 rounded-lg border border-slate-300 bg-slate-50 outline-none shadow-sm focus:border-blue-500 text-sm" />
                                            </div>
                                        </div>
                                    )}
                                    <button type="submit" className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] transition-all flex items-center justify-center gap-2 mt-2 text-sm">
                                        Masuk ke Sistem <i className="fas fa-arrow-right"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    {/* Bagian Kanan: Gambar Bupati Melayang (Hidden di Mobile) */}
                    <div className="hidden md:flex w-1/2 items-center justify-center p-8 relative">
                        <img 
                            src="https://i.ibb.co.com/Jw99np6b/bupatinn.jpg" 
                            alt="Bupati Donggala" 
                            className="max-w-full max-h-[85vh] object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)] animate-float-img rounded-2xl"
                        />
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
