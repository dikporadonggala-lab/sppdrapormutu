<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem MONEV Pendidikan Dasar Donggala</title>
    <link rel="icon" href="https://i.ibb.co.com/5xhN0cm1/Logo-Donggala.png" type="image/png">
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Font Awesome untuk Ikon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- 3. React & ReactDOM (UMD Build) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 4. Babel (Untuk membaca sintaks JSX di dalam browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 5. Dependencies untuk Recharts (Grafik) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <!-- 6. Library Excel (SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            body * { visibility: hidden; background: white; margin: 0; padding: 0; }
            aside, header, nav.md\:hidden { display: none !important; }
            .flex-1 { overflow: visible !important; padding-bottom: 0 !important; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 0; }
            .print\:break-after-page { page-break-after: always; break-after: page; }
            
            /* Tweak untuk tabel instrumen agar rapi di PDF */
            .print-table th, .print-table td { border: 1px solid #000; padding: 6px; }
            .print-table th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; }
        }
        .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased overflow-hidden">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer } = window.Recharts;

        // =========================================================================
        // 1. MASUKKAN LINK GOOGLE APPS SCRIPT ANDA DI BAWAH INI
        // =========================================================================
        const GOOGLE_SCRIPT_URL = "MASUKKAN_LINK_APPS_SCRIPT_ANDA_DI_SINI"; 

        // =========================================================================
        // 2. MASUKKAN LINK PDF BUKU PANDUAN (DARI GOOGLE DRIVE ANDA) DI BAWAH INI
        // =========================================================================
        const LINK_PANDUAN_PDF = "MASUKKAN_LINK_GOOGLE_DRIVE_PANDUAN_DISINI";

        // --- CONSTANTS ---
        const KECAMATAN_LIST = [
            "Sojol Utara", "Sojol", "Dampelas", "Balaesang", "Balaesang Tanjung", 
            "Sirenja", "Sindue Tobata", "Sindue Tombusabora", "Sindue", "Labuan", 
            "Tanantovea", "Pinembani", "Banawa", "Banawa Tengah", "Banawa Selatan", "Rio Pakava"
        ];
        const JENJANG_LIST = ["SD", "SMP"];
        const TRIWULAN_LIST = ["Triwulan 1", "Triwulan 2", "Triwulan 3", "Triwulan 4"];
        const KELAS_LIST = ["Kelas 1", "Kelas 2", "Kelas 3", "Kelas 4", "Kelas 5", "Kelas 6", "Kelas 7", "Kelas 8", "Kelas 9"];

        const MATERI_LITERASI = {
            "Kelas 1": { "Triwulan 1": "Mengenal huruf, bunyi huruf, dan suku kata.", "Triwulan 2": "Membaca kata dan kalimat sederhana (3–5 kata).", "Triwulan 3": "Memahami isi teks sangat pendek (2–3 kalimat).", "Triwulan 4": "Menjawab pertanyaan sederhana tentang teks dan menceritakan kembali isi bacaan secara lisan." },
            "Kelas 2": { "Triwulan 1": "Membaca teks pendek 1 paragraf dengan lancar.", "Triwulan 2": "Menemukan informasi dasar (siapa, apa, di mana).", "Triwulan 3": "Menceritakan kembali isi teks secara sederhana.", "Triwulan 4": "Menulis kalimat sederhana dengan tanda baca dasar." },
            "Kelas 3": { "Triwulan 1": "Mengidentifikasi informasi penting (tokoh, peristiwa, tempat) dalam paragraf pendek.", "Triwulan 2": "Menemukan informasi penting dalam teks.", "Triwulan 3": "Membandingkan dua informasi sederhana.", "Triwulan 4": "Menulis paragraf pendek runtut." },
            "Kelas 4": { "Triwulan 1": "Menemukan informasi penting dalam teks informatif.", "Triwulan 2": "Menjelaskan hubungan antar informasi dalam teks.", "Triwulan 3": "Menyimpulkan isi teks.", "Triwulan 4": "Menyimpulkan isi teks sederhana berdasarkan informasi yang dibaca." },
            "Kelas 5": { "Triwulan 1": "Mengidentifikasi hubungan sebab–akibat dalam teks.", "Triwulan 2": "Membandingkan informasi dari dua teks.", "Triwulan 3": "Menganalisis isi teks informatif.", "Triwulan 4": "Menentukan pesan dan nilai yang terkandung dalam teks informatif." },
            "Kelas 6": { "Triwulan 1": "Menganalisis hubungan antar ide dan informasi penting dalam teks.", "Triwulan 2": "Menyusun simpulan teks disertai alasan berdasarkan isi bacaan.", "Triwulan 3": "Mengintegrasikan informasi dari dua teks.", "Triwulan 4": "Mengevaluasi isi teks dengan alasan logis." },
            "Kelas 7": { "Triwulan 1": "Menemukan gagasan utama dan informasi penting teks.", "Triwulan 2": "Menafsirkan informasi tersirat dalam teks.", "Triwulan 3": "Menganalisis struktur dan isi teks.", "Triwulan 4": "Membandingkan informasi dari dua teks." },
            "Kelas 8": { "Triwulan 1": "Mengidentifikasi argumen dalam teks.", "Triwulan 2": "Menilai keakuratan informasi dalam teks.", "Triwulan 3": "Menganalisis kesesuaian argumen dan bukti dalam teks argumentatif.", "Triwulan 4": "Mengintegrasikan informasi dari beberapa teks." },
            "Kelas 9": { "Triwulan 1": "Menemukan ide utama dan argumen dalam teks kompleks.", "Triwulan 2": "Mengevaluasi kredibilitas sumber informasi.", "Triwulan 3": "Mengintegrasikan informasi dari berbagai teks.", "Triwulan 4": "Menyusun kesimpulan argumentative." }
        };

        const MATERI_NUMERASI = {
            "Kelas 1": { "Triwulan 1": "Mengenal bilangan sampai 100.", "Triwulan 2": "Membandingkan dan mengurutkan bilangan.", "Triwulan 3": "Melakukan penjumlahan dan pengurangan sederhana sampai 20.", "Triwulan 4": "Menentukan bilangan yang lebih besar atau lebih kecil dalam konteks benda sehari-hari sampai 100." },
            "Kelas 2": { "Triwulan 1": "Penjumlahan hingga 100.", "Triwulan 2": "Pengurangan hingga 100.", "Triwulan 3": "Memahami konsep perkalian sebagai penjumlahan berulang melalui benda konkret.", "Triwulan 4": "Memecahkan soal cerita satu langkah." },
            "Kelas 3": { "Triwulan 1": "Menyelesaikan masalah perkalian bilangan cacah sampai 100 dengan bantuan gambar atau benda konkret.", "Triwulan 2": "Menyelesaikan masalah pembagian bilangan cacah secara konkret sebagai pengelompokan atau pengurangan berulang.", "Triwulan 3": "Memahami pecahan sederhana (½, ⅓, ¼).", "Triwulan 4": "Menyelesaikan soal cerita dua langkah." },
            "Kelas 4": { "Triwulan 1": "Menyelesaikan masalah kontekstual satu-dua langkah yang melibatkan dua operasi bilangan.", "Triwulan 2": "Menggunakan pecahan senilai.", "Triwulan 3": "Menafsirkan data pada tabel/grafik.", "Triwulan 4": "Menyelesaikan masalah kontekstual dua langkah." },
            "Kelas 5": { "Triwulan 1": "Menggunakan operasi pecahan.", "Triwulan 2": "Membandingkan dan mengurutkan bilangan desimal satu angka di belakang koma dalam konteks sehari-hari.", "Triwulan 3": "Menafsirkan grafik.", "Triwulan 4": "Menyelesaikan masalah kontekstual multi langkah." },
            "Kelas 6": { "Triwulan 1": "Operasi pecahan campuran.", "Triwulan 2": "Menggunakan perbandingan.", "Triwulan 3": "Menafsirkan data tabel/grafik.", "Triwulan 4": "Menyelesaikan masalah kontekstual multi langkah yang melibatkan operasi pecahan dan perbandingan." },
            "Kelas 7": { "Triwulan 1": "Operasi bilangan bulat dalam berbagai situasi.", "Triwulan 2": "Operasi pecahan dalam masalah kontekstual.", "Triwulan 3": "Persamaan linear satu variabel.", "Triwulan 4": "Menganalisis dan menarik kesimpulan dari data yang disajikan dalam tabel dan berbagai jenis grafik." },
            "Kelas 8": { "Triwulan 1": "Memahami relasi dan fungsi.", "Triwulan 2": "Menyelesaikan SPLDV sederhana.", "Triwulan 3": "Menentukan dan menafsirkan mean, median, dan modus dari data untuk pengambilan keputusan sederhana.", "Triwulan 4": "Masalah kontekstual multi langkah." },
            "Kelas 9": { "Triwulan 1": "Persamaan kuadrat sederhana.", "Triwulan 2": "Konsep peluang sederhana.", "Triwulan 3": "Menafsirkan data statistika.", "Triwulan 4": "Menyelesaikan masalah kontekstual kompleks yang mengintegrasikan persamaan, data statistika, atau peluang." }
        };

        const DEFAULT_THRESHOLDS = { pctTinggi: 80, pctSedang: 60, iklimTinggi: 3, iklimSedang: 2 };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [records, setRecords] = useState([]);
            const [npsnDB, setNpsnDB] = useState({});
            const [usersDB, setUsersDB] = useState([]);
            const [toast, setToast] = useState(null);
            const [user, setUser] = useState(null); 
            const [isLoading, setIsLoading] = useState(false);

            const [thresholds, setThresholds] = useState(() => {
                const saved = localStorage.getItem('monev_thresholds');
                return saved ? JSON.parse(saved) : DEFAULT_THRESHOLDS;
            });

            const handleSaveThresholds = (newT) => {
                setThresholds(newT);
                localStorage.setItem('monev_thresholds', JSON.stringify(newT));
            };

            useEffect(() => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === "MASUKKAN_LINK_APPS_SCRIPT_ANDA_DI_SINI") return;

                const fetchSheetData = async () => {
                    setIsLoading(true);
                    try {
                        const fetchUrl = GOOGLE_SCRIPT_URL + (GOOGLE_SCRIPT_URL.includes('?') ? '&' : '?') + 'nocache=' + new Date().getTime();
                        
                        const response = await fetch(fetchUrl);
                        const result = await response.json();
                        
                        if (result.status === 'success') {
                            if (result.data.records && result.data.records.length > 0) setRecords(result.data.records);
                            if (result.data.npsn && Object.keys(result.data.npsn).length > 0) setNpsnDB(result.data.npsn);
                            if (result.data.users && result.data.users.length > 0) {
                                const cleanUsers = result.data.users.map(u => {
                                    let obj = {};
                                    for (let key in u) obj[key.trim().toLowerCase()] = u[key];
                                    return obj;
                                });
                                setUsersDB(cleanUsers);
                            }
                        }
                    } catch (error) {
                        console.error("Gagal mengambil data Sheet:", error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchSheetData();
            }, []);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleAddRecord = async (newRecord) => {
                const recordWithId = { ...newRecord, id: Date.now() };
                setRecords([...records, recordWithId]);
                setActiveTab('monitoring');

                if (GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== "MASUKKAN_LINK_APPS_SCRIPT_ANDA_DI_SINI") {
                    showToast('Mengirim data ke server, mohon tunggu...', 'info');
                    try {
                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'add_record', data: recordWithId })
                        });
                        showToast('Data berhasil disimpan ke Sheet!');
                    } catch (error) {
                        showToast('Gagal mengirim ke server.', 'error');
                    }
                } else {
                    showToast('Disimpan (Mode Lokal)');
                }
            };

            const handleDelete = async (id) => {
                if (window.confirm('Yakin ingin menghapus data ini?')) {
                    setRecords(records.filter(r => r.id !== id));
                    if (GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== "MASUKKAN_LINK_APPS_SCRIPT_ANDA_DI_SINI") {
                        try {
                            await fetch(GOOGLE_SCRIPT_URL, {
                                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'delete_record', id: id })
                            });
                            showToast('Data dihapus dari server.', 'success');
                        } catch (error) {
                            showToast('Gagal menghapus di server.', 'error');
                        }
                    } else {
                        showToast('Data dihapus (Lokal).', 'error');
                    }
                }
            };

            const handleLogout = () => { setUser(null); setActiveTab('dashboard'); };

            const accessibleRecords = useMemo(() => {
                if (!user) return [];
                if (user.role === 'sekolah') return records.filter(r => r.kecamatan === user.kecamatan && r.sekolah.toLowerCase().includes(user.sekolah.toLowerCase()));
                if (user.role === 'korwil') return records.filter(r => r.kecamatan === user.kecamatan);
                return records; 
            }, [records, user]);

            if (!user) return <Login onLogin={setUser} npsnDB={npsnDB} usersDB={usersDB} isLoading={isLoading} />;

            return (
                <div className="flex h-screen bg-slate-50 font-sans text-slate-800">
                <style>{`
                    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
                    .animate-float-1 { animation: float 3.5s ease-in-out infinite; }
                    .animate-float-2 { animation: float 3.2s ease-in-out infinite 0.2s; }
                    .animate-float-3 { animation: float 3.8s ease-in-out infinite 0.4s; }
                    .animate-float-4 { animation: float 3.4s ease-in-out infinite 0.6s; }
                    .animate-float-5 { animation: float 3.6s ease-in-out infinite 0.8s; }
                `}</style>

                <aside className="hidden md:flex w-64 bg-slate-900 text-slate-200 flex-col shadow-xl z-20">
                    <div className="p-5 flex items-center gap-3 border-b border-slate-700">
                    <div className="bg-white p-1 rounded-lg">
                        <img src="https://i.ibb.co.com/5xhN0cm1/Logo-Donggala.png" alt="Logo Donggala" className="w-8 h-8 object-contain" />
                    </div>
                    <div>
                        <h1 className="font-bold text-sm leading-tight">MONEV Donggala</h1>
                        <p className="text-[10px] text-slate-400">Monitoring & Evaluasi</p>
                    </div>
                    </div>
                    <nav className="flex-1 py-4 flex flex-col gap-1 px-3 overflow-y-auto no-scrollbar">
                    <SidebarItem icon={<i className="fas fa-th-large"></i>} label="Dashboard Utama" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                    {user.role === 'sekolah' && (
                        <SidebarItem icon={<i className="fas fa-edit"></i>} label="Input Data Sekolah" active={activeTab === 'input'} onClick={() => setActiveTab('input')} />
                    )}
                    <SidebarItem icon={<i className="fas fa-desktop"></i>} label="Monitoring Data" active={activeTab === 'monitoring'} onClick={() => setActiveTab('monitoring')} />
                    <SidebarItem icon={<i className="fas fa-download"></i>} label="Unduh Laporan" active={activeTab === 'laporan'} onClick={() => setActiveTab('laporan')} />
                    
                    {user.role === 'dinas' && (
                        <div className="mt-4 pt-4 border-t border-slate-800">
                        <p className="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Administrator</p>
                        <SidebarItem icon={<i className="fas fa-users"></i>} label="Pengaturan Sistem" active={activeTab === 'pengguna'} onClick={() => setActiveTab('pengguna')} />
                        </div>
                    )}
                    </nav>
                    <div className="p-4 border-t border-slate-800 text-xs text-center text-slate-500">
                    <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 text-red-400 hover:text-red-300 hover:bg-slate-800 p-2 mb-3 rounded transition-colors">
                        <i className="fas fa-sign-out-alt"></i> Keluar Akun
                    </button>
                    Versi 8.2 (Favicon Ditambahkan)
                    </div>
                </aside>

                <main className="flex-1 flex flex-col h-screen overflow-hidden pb-16 md:pb-0">
                    <header className="bg-white h-16 shadow-sm flex items-center px-4 md:px-6 justify-between z-10 flex-shrink-0">
                    <h2 className="text-lg md:text-xl font-semibold text-slate-800 capitalize truncate pr-2">
                        {activeTab.replace('-', ' ')}
                    </h2>
                    <div className="flex items-center gap-2 md:gap-3 flex-shrink-0">
                        <div className="text-right flex flex-col justify-center">
                        <p className="text-[11px] md:text-sm font-bold md:font-medium leading-tight">{user.name}</p>
                        <p className="text-[9px] md:text-xs text-slate-500 capitalize leading-tight">{user.role === 'sekolah' ? 'Admin Sekolah' : user.role === 'korwil' ? `Korwil ${user.kecamatan}` : 'Admin / Superadmin'}</p>
                        </div>
                        <div className="w-8 h-8 md:w-10 md:h-10 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold text-xs md:text-sm uppercase shadow-sm">
                        {user.name.substring(0, 2)}
                        </div>
                    </div>
                    </header>

                    <div className="flex-1 overflow-auto p-4 md:p-6 relative bg-slate-50 flex flex-col">
                    {activeTab === 'dashboard' && <Dashboard records={accessibleRecords} user={user} thresholds={thresholds} />}
                    {activeTab === 'input' && <InputData onSubmit={handleAddRecord} user={user} />}
                    {activeTab === 'monitoring' && <Monitoring records={accessibleRecords} onDelete={handleDelete} user={user} thresholds={thresholds} npsnDB={npsnDB} />}
                    {activeTab === 'laporan' && <Laporan records={accessibleRecords} user={user} />}
                    {activeTab === 'pengguna' && <KelolaPengguna showToast={showToast} GOOGLE_SCRIPT_URL={GOOGLE_SCRIPT_URL} thresholds={thresholds} onSaveThresholds={handleSaveThresholds} />}

                    {toast && (
                        <div className={`fixed top-20 md:bottom-6 md:top-auto right-4 md:right-6 px-4 py-3 rounded-lg shadow-lg text-white font-medium flex items-center gap-2 transition-all z-50 animate-slide-in ${toast.type === 'error' ? 'bg-red-500' : toast.type === 'info' ? 'bg-blue-500' : 'bg-emerald-600'}`}>
                        {toast.type === 'success' ? <i className="fas fa-check-circle"></i> : <i className="fas fa-exclamation-triangle"></i>}
                        {toast.message}
                        </div>
                    )}
                    </div>
                </main>

                <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center h-16 z-50 px-1 safe-area-pb shadow-[0_-5px_10px_rgba(0,0,0,0.05)]">
                    <BottomNavItem icon={<i className="fas fa-th-large"></i>} label="Beranda" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                    {user.role === 'sekolah' && (
                        <BottomNavItem icon={<i className="fas fa-edit"></i>} label="Input" active={activeTab === 'input'} onClick={() => setActiveTab('input')} />
                    )}
                    <BottomNavItem icon={<i className="fas fa-desktop"></i>} label="Data" active={activeTab === 'monitoring'} onClick={() => setActiveTab('monitoring')} />
                    <BottomNavItem icon={<i className="fas fa-download"></i>} label="Laporan" active={activeTab === 'laporan'} onClick={() => setActiveTab('laporan')} />
                    {user.role === 'dinas' && (
                        <BottomNavItem icon={<i className="fas fa-users"></i>} label="Akun" active={activeTab === 'pengguna'} onClick={() => setActiveTab('pengguna')} />
                    )}
                    <BottomNavItem icon={<i className="fas fa-sign-out-alt"></i>} label="Keluar" onClick={handleLogout} isLogout={true} />
                </nav>
                </div>
            );
        }

        function SidebarItem({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-left w-full ${active ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 text-slate-300'}`}>
                <div className="w-5 h-5 flex items-center justify-center text-lg">{icon}</div>
                <span className="font-medium text-sm">{label}</span>
                </button>
            );
        }

        function BottomNavItem({ icon, label, active, onClick, isLogout }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${isLogout ? 'text-red-500 hover:text-red-700' : active ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
                    <div className={`text-lg mb-0.5 ${active ? 'transform -translate-y-1 transition-transform' : ''}`}>{icon}</div>
                    <span className="text-[9px] font-medium leading-none">{label}</span>
                </button>
            );
        }

        function Dashboard({ records, user, thresholds }) {
            const stats = useMemo(() => {
                const calculateForJenjang = (jenjangFilter) => {
                    let filteredRecords = records;
                    if (jenjangFilter) {
                        filteredRecords = records.filter(r => r.jenjang === jenjangFilter);
                    }

                    const latestRecordsMap = {};
                    filteredRecords.forEach(r => {
                        const key = `${r.sekolah}-${r.kelas}-${r.rombel}`.toLowerCase().replace(/\s+/g, '');
                        if (!latestRecordsMap[key] || r.triwulan > latestRecordsMap[key].triwulan) {
                            latestRecordsMap[key] = r;
                        }
                    });

                    let totalSiswa = 0, totalLit = 0, totalNum = 0, totalKar = 0;
                    let totalSec = 0, totalDiv = 0, totalInc = 0, totalBel = 0, totalRef = 0, totalPim = 0;
                    const uniqueRecords = Object.values(latestRecordsMap);

                    uniqueRecords.forEach(r => {
                        totalSiswa += Number(r.jumlahSiswa); 
                        totalLit += Number(r.tuntas_literasi || r.capaiLiterasi || 0); 
                        totalNum += Number(r.tuntas_numerasi || r.capaiNumerasi || 0);
                        
                        totalKar += Number(r.karakter_teratur || 0) + Number(r.karakter_pantang_menyerah || 0) + Number(r.karakter_mandiri || 0);
                        
                        totalSec += Number(r.k_aman_1||0) + Number(r.k_aman_2||0) + Number(r.k_aman_3||0) || Number(r.keamanan||0);
                        totalDiv += Number(r.k_bineka_1||0) + Number(r.k_bineka_2||0) + Number(r.k_bineka_3||0) || Number(r.kebinekaan||0);
                        totalInc += Number(r.k_inklusif_1||0) + Number(r.k_inklusif_2||0) + Number(r.k_inklusif_3||0) || Number(r.inklusivitas||0);
                        
                        totalBel += Number(r.k_belajar_1||0) + Number(r.k_belajar_2||0) + Number(r.k_belajar_3||0);
                        totalRef += Number(r.k_refleksi_1||0) + Number(r.k_refleksi_2||0) + Number(r.k_refleksi_3||0);
                        totalPim += Number(r.k_pimpin_1||0) + Number(r.k_pimpin_2||0) + Number(r.k_pimpin_3||0);
                    });

                    return {
                        lit: totalSiswa ? Math.round((totalLit / totalSiswa) * 100) : 0,
                        num: totalSiswa ? Math.round((totalNum / totalSiswa) * 100) : 0,
                        kar: totalSiswa ? Math.round((totalKar / (totalSiswa * 3)) * 100) : 0,
                        sec: uniqueRecords.length ? (totalSec / uniqueRecords.length).toFixed(1) : 0, 
                        div: uniqueRecords.length ? (totalDiv / uniqueRecords.length).toFixed(1) : 0, 
                        inc: uniqueRecords.length ? (totalInc / uniqueRecords.length).toFixed(1) : 0,
                        bel: uniqueRecords.length ? (totalBel / uniqueRecords.length).toFixed(1) : 0,
                        ref: uniqueRecords.length ? (totalRef / uniqueRecords.length).toFixed(1) : 0,
                        pim: uniqueRecords.length ? (totalPim / uniqueRecords.length).toFixed(1) : 0
                    };
                };

                return {
                    ALL: calculateForJenjang(null),
                    SD: calculateForJenjang('SD'),
                    SMP: calculateForJenjang('SMP')
                };
            }, [records]);

            const trendData = useMemo(() => {
                const dataByTriwulan = {};
                TRIWULAN_LIST.forEach(t => { 
                    dataByTriwulan[t] = { 
                        name: t, 
                        lit: 0, num: 0, siswa: 0,
                        lit_SD: 0, num_SD: 0, siswa_SD: 0,
                        lit_SMP: 0, num_SMP: 0, siswa_SMP: 0
                    }; 
                });

                records.forEach(r => {
                    if(dataByTriwulan[r.triwulan]) {
                        const j = r.jenjang === 'SMP' ? 'SMP' : 'SD';
                        const lit = Number(r.tuntas_literasi || r.capaiLiterasi || 0);
                        const num = Number(r.tuntas_numerasi || r.capaiNumerasi || 0);
                        const s = Number(r.jumlahSiswa || 0);

                        dataByTriwulan[r.triwulan][`lit_${j}`] += lit;
                        dataByTriwulan[r.triwulan][`num_${j}`] += num;
                        dataByTriwulan[r.triwulan][`siswa_${j}`] += s;
                        
                        dataByTriwulan[r.triwulan].lit += lit;
                        dataByTriwulan[r.triwulan].num += num;
                        dataByTriwulan[r.triwulan].siswa += s;
                    }
                });

                return TRIWULAN_LIST.map(t => {
                    const d = dataByTriwulan[t];
                    return {
                        name: t,
                        "Capaian Literasi (%)": d.siswa ? Math.round((d.lit / d.siswa) * 100) : 0,
                        "Capaian Numerasi (%)": d.siswa ? Math.round((d.num / d.siswa) * 100) : 0,
                        "Lit. SD (%)": d.siswa_SD ? Math.round((d.lit_SD / d.siswa_SD) * 100) : 0,
                        "Num. SD (%)": d.siswa_SD ? Math.round((d.num_SD / d.siswa_SD) * 100) : 0,
                        "Lit. SMP (%)": d.siswa_SMP ? Math.round((d.lit_SMP / d.siswa_SMP) * 100) : 0,
                        "Num. SMP (%)": d.siswa_SMP ? Math.round((d.num_SMP / d.siswa_SMP) * 100) : 0,
                        hasData: d.siswa > 0
                    };
                }).filter(d => d.hasData);
            }, [records]);

            const mapData = useMemo(() => {
                const data = {};
                KECAMATAN_LIST.forEach(k => { data[k] = { siswa: 0, target: 0 }; });

                const latestRecordsMap = {};
                records.forEach(r => {
                    const key = `${r.sekolah}-${r.kelas}-${r.rombel}`.toLowerCase().replace(/\s+/g, '');
                    if (!latestRecordsMap[key] || r.triwulan > latestRecordsMap[key].triwulan) {
                        latestRecordsMap[key] = r;
                    }
                });

                Object.values(latestRecordsMap).forEach(r => { 
                    data[r.kecamatan].siswa += Number(r.jumlahSiswa); 
                    data[r.kecamatan].target += (Number(r.tuntas_literasi || r.capaiLiterasi || 0) + Number(r.tuntas_numerasi || r.capaiNumerasi || 0)) / 2; 
                });

                return KECAMATAN_LIST.map(k => {
                const pct = data[k].siswa ? (data[k].target / data[k].siswa) * 100 : null;
                let color = 'bg-slate-100 text-slate-400 border-slate-200'; 
                if (pct !== null) {
                    if (pct >= thresholds.pctTinggi) color = 'bg-emerald-100 text-emerald-700 border-emerald-300';
                    else if (pct >= thresholds.pctSedang) color = 'bg-amber-100 text-amber-700 border-amber-300';
                    else color = 'bg-red-100 text-red-700 border-red-300';
                }
                return { nama: k, pct, color };
                });
            }, [records, thresholds]);

            const isDinas = user?.role === 'dinas';
            const isSekolah = user?.role === 'sekolah';

            const renderCardValue = (key, isLitNum = false) => {
                // Tampilan untuk Admin Sekolah (Satu Baris Saja)
                if (isSekolah) {
                    const s = stats.ALL;
                    if (isLitNum) {
                        return (
                            <div className="flex items-center justify-between w-full text-base md:text-lg font-bold">
                                <span className="text-red-600">L: {s.lit}%</span>
                                <span className="text-slate-300 font-light">|</span>
                                <span className="text-red-600">N: {s.num}%</span>
                            </div>
                        );
                    }
                    const isPctOnly = key === 'kar';
                    const valStr = s[key];
                    const pct = Math.round((Number(valStr) / 3) * 100) || 0;
                    return (
                        <div className="text-base md:text-lg font-bold flex items-baseline justify-between w-full text-red-600">
                            {isPctOnly ? <span>{valStr}%</span> : <><span className="text-red-600">{valStr}/3</span> <span className="text-[10px] md:text-xs text-red-400 font-bold">({pct}%)</span></>}
                        </div>
                    );
                }

                // Tampilan untuk Dinas dan Korwil (Dua Baris SD/SMP, Merah/Biru)
                if (isLitNum) {
                    return (
                        <div className="flex flex-col w-full text-xs md:text-sm font-bold tracking-tight mt-1">
                            <div className="flex justify-between items-center text-red-600 pb-1.5 mb-1.5 border-b border-slate-200 border-dashed">
                                <span>SD</span>
                                <span>L: {stats.SD.lit}% <span className="text-red-300 font-light mx-0.5">|</span> N: {stats.SD.num}%</span>
                            </div>
                            <div className="flex justify-between items-center text-blue-600">
                                <span>SMP</span>
                                <span>L: {stats.SMP.lit}% <span className="text-blue-300 font-light mx-0.5">|</span> N: {stats.SMP.num}%</span>
                            </div>
                        </div>
                    );
                }

                const isPctOnly = key === 'kar';
                const formatVal = (sObj) => {
                    if (isPctOnly) return <span>{sObj[key]}%</span>;
                    const valStr = sObj[key];
                    const pct = Math.round((Number(valStr) / 3) * 100) || 0;
                    return <>{valStr}/3 <span className="text-[10px] md:text-xs font-semibold opacity-75 ml-1">({pct}%)</span></>;
                };

                return (
                    <div className="flex flex-col w-full text-xs md:text-sm font-bold tracking-tight mt-1">
                        <div className="flex justify-between items-center text-red-600 pb-1.5 mb-1.5 border-b border-slate-200 border-dashed">
                            <span>SD</span>
                            <span className="flex items-center">{formatVal(stats.SD)}</span>
                        </div>
                        <div className="flex justify-between items-center text-blue-600">
                            <span>SMP</span>
                            <span className="flex items-center">{formatVal(stats.SMP)}</span>
                        </div>
                    </div>
                );
            };

            return (
                <div className="space-y-6">
                
                {/* --- BANNER PANDUAN KHUSUS SEKOLAH --- */}
                {isSekolah && (
                    <div className="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-5 md:p-6 rounded-xl shadow-md mb-6 flex flex-col md:flex-row items-center justify-between gap-4 animate-slide-in">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-white/20 rounded-full flex-shrink-0">
                                <i className="fas fa-book-open text-2xl text-white"></i>
                            </div>
                            <div>
                                <h3 className="text-lg font-bold tracking-wide">Panduan Laporan MONEV</h3>
                                <p className="text-xs md:text-sm text-blue-100 mt-1 leading-snug">Unduh dan pelajari buku panduan resmi sebelum melakukan pengisian data instrumen agar data yang diinput lebih akurat.</p>
                            </div>
                        </div>
                        <a href={LINK_PANDUAN_PDF} target="_blank" className="w-full md:w-auto bg-white text-blue-700 px-6 py-3 rounded-lg font-bold text-sm shadow-sm hover:bg-blue-50 transition-colors flex items-center justify-center gap-2 whitespace-nowrap hover:shadow-lg flex-shrink-0">
                            <i className="fas fa-download"></i> Unduh PDF Panduan
                        </a>
                    </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 pt-2">
                    <StatCard 
                        title="Literasi & Num." 
                        value={renderCardValue('litnum', true)} 
                        icon={<div className="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 text-xl"><i className="fas fa-book-reader"></i></div>} 
                        idx={1} 
                    />
                    <StatCard 
                        title="Karakter Siswa" 
                        value={renderCardValue('kar')} 
                        icon={<div className="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center text-amber-500 text-xl"><i className="fas fa-star"></i></div>} 
                        idx={2} 
                    />
                    <StatCard 
                        title="Iklim Keamanan" 
                        value={renderCardValue('sec')} 
                        icon={<div className="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-500 text-xl"><i className="fas fa-shield-alt"></i></div>} 
                        idx={3} 
                    />
                    <StatCard 
                        title="Iklim Kebhinekaan" 
                        value={renderCardValue('div')} 
                        icon={<div className="w-10 h-10 rounded-xl bg-orange-50 flex items-center justify-center text-orange-500 text-xl"><i className="fas fa-users"></i></div>} 
                        idx={4} 
                    />
                    <StatCard 
                        title="Iklim Inklusivitas" 
                        value={renderCardValue('inc')} 
                        icon={<div className="w-10 h-10 rounded-xl bg-rose-50 flex items-center justify-center text-rose-500 text-xl"><i className="fas fa-hands-helping"></i></div>} 
                        idx={5} 
                    />
                    <StatCard 
                        title="Kualitas Pembelajaran" 
                        value={renderCardValue('bel')} 
                        icon={<div className="w-10 h-10 rounded-xl bg-cyan-50 flex items-center justify-center text-cyan-500 text-xl"><i className="fas fa-chalkboard-teacher"></i></div>} 
                        idx={6} 
                    />
                    <StatCard 
                        title="Refleksi Guru" 
                        value={renderCardValue('ref')} 
                        icon={<div className="w-10 h-10 rounded-xl bg-yellow-50 flex items-center justify-center text-yellow-500 text-xl"><i className="fas fa-lightbulb"></i></div>} 
                        idx={7} 
                    />
                    <StatCard 
                        title="Kepemimpinan Instruksional" 
                        value={renderCardValue('pim')} 
                        icon={<div className="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-purple-500 text-xl"><i className="fas fa-user-tie"></i></div>} 
                        idx={8} 
                    />
                </div>

                <div className={`grid grid-cols-1 ${isDinas ? 'lg:grid-cols-3' : 'lg:grid-cols-1'} gap-6`}>
                    <div className={`${isDinas ? 'lg:col-span-2' : 'w-full'} bg-white p-5 rounded-2xl border border-slate-100 shadow-sm`}>
                    <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2 text-sm md:text-base">
                        <i className="fas fa-chart-line text-blue-600"></i> 
                        Tren Belajar {isDinas ? 'Kabupaten' : user?.role === 'korwil' ? `Kec. ${user?.kecamatan}` : user?.sekolah}
                    </h3>
                    <div className="h-64 md:h-72">
                        <ResponsiveContainer width="100%" height="100%">
                        <LineChart data={trendData} margin={{ top: 5, right: 20, bottom: 5, left: -20 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0"/>
                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 11}} />
                            <YAxis axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 11}} domain={[0, 100]} />
                            <RechartsTooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '12px'}} />
                            <Legend iconType="circle" wrapperStyle={{fontSize: '12px', paddingTop: '10px'}} />
                            
                            {/* PENGHAPUSAN REACT FRAGMENT UNTUK MENCEGAH BLANK PAGE (RECHARTS BUG FIX) */}
                            {isSekolah ? <Line type="monotone" dataKey="Capaian Literasi (%)" stroke="#3b82f6" strokeWidth={3} dot={{r: 4}} /> : null}
                            {isSekolah ? <Line type="monotone" dataKey="Capaian Numerasi (%)" stroke="#6366f1" strokeWidth={3} dot={{r: 4}} /> : null}
                            
                            {!isSekolah ? <Line type="monotone" dataKey="Lit. SD (%)" stroke="#ef4444" strokeWidth={3} dot={{r: 4}} /> : null}
                            {!isSekolah ? <Line type="monotone" dataKey="Num. SD (%)" stroke="#f87171" strokeWidth={3} strokeDasharray="5 5" dot={{r: 4}} /> : null}
                            {!isSekolah ? <Line type="monotone" dataKey="Lit. SMP (%)" stroke="#3b82f6" strokeWidth={3} dot={{r: 4}} /> : null}
                            {!isSekolah ? <Line type="monotone" dataKey="Num. SMP (%)" stroke="#60a5fa" strokeWidth={3} strokeDasharray="5 5" dot={{r: 4}} /> : null}
                        </LineChart>
                        </ResponsiveContainer>
                    </div>
                    </div>

                    {isDinas && (
                    <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col">
                        <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2 text-sm md:text-base">
                        <i className="fas fa-map-marked-alt text-blue-600"></i> Sebaran Kinerja
                        </h3>
                        <div className="grid grid-cols-2 gap-3 overflow-y-auto max-h-64 md:max-h-72 pr-2 no-scrollbar">
                        {mapData.map((k, i) => (
                            <div key={i} className={`p-3 rounded-xl border text-[10px] md:text-sm flex flex-col items-center justify-center text-center ${k.color} transition-all hover:shadow-sm`}>
                            <span className="font-semibold leading-tight">{k.nama}</span>
                            <span className="mt-1.5 font-bold">{k.pct !== null ? `${k.pct.toFixed(0)}%` : 'Kosong'}</span>
                            </div>
                        ))}
                        </div>
                        <div className="mt-4 flex flex-wrap items-center justify-center gap-2 md:gap-4 text-[10px] md:text-xs text-slate-500 border-t pt-4">
                        <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 bg-emerald-400 rounded-full"></div> &ge;{thresholds.pctTinggi}%</span>
                        <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 bg-amber-400 rounded-full"></div> {thresholds.pctSedang}-{thresholds.pctTinggi - 1}%</span>
                        <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 bg-red-400 rounded-full"></div> &lt;{thresholds.pctSedang}%</span>
                        </div>
                    </div>
                    )}
                </div>
                </div>
            );
        }

        function StatCard({ title, value, icon, idx = 1 }) {
            return (
                <div className={`bg-white p-4 md:p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between animate-float-${idx} hover:-translate-y-1 hover:shadow-md transition-all duration-300 w-full min-h-[120px]`}>
                    <div className="flex items-center gap-3 w-full mb-3">
                        <div className="flex-shrink-0">{icon}</div>
                        <p className="text-[10px] md:text-[11px] text-slate-500 font-bold uppercase tracking-wide leading-tight flex-1">{title}</p>
                    </div>
                    <div className="w-full flex-1 flex flex-col justify-end">
                        {value}
                    </div>
                </div>
            );
        }

        function InputData({ onSubmit, user }) {
            const currentYear = new Date().getFullYear();
            const defaultTahunAjaran = `${currentYear}/${currentYear+1}`;

            const [formData, setFormData] = useState({
                tahunAjaran: defaultTahunAjaran, sekolah: user?.sekolah || '', kecamatan: user?.kecamatan || KECAMATAN_LIST[0], 
                jenjang: JENJANG_LIST[0], kelas: KELAS_LIST[0], rombel: '', triwulan: TRIWULAN_LIST[0], jumlahSiswa: '',
                namaKepsek: '', namaGuru: '',
                
                k_aman_1: 0, k_aman_2: 0, k_aman_3: 0,
                k_bineka_1: 0, k_bineka_2: 0, k_bineka_3: 0,
                k_inklusif_1: 0, k_inklusif_2: 0, k_inklusif_3: 0,
                k_belajar_1: 0, k_belajar_2: 0, k_belajar_3: 0,
                k_refleksi_1: 0, k_refleksi_2: 0, k_refleksi_3: 0,
                k_pimpin_1: 0, k_pimpin_2: 0, k_pimpin_3: 0,
                
                tuntas_literasi: '', tuntas_numerasi: '',
                karakter_teratur: '', karakter_pantang_menyerah: '', karakter_mandiri: '',
                tautan_bukti: '', catatan: ''
            });

            const [error, setError] = useState('');

            const handleChange = (e) => { 
                const { name, value, type, checked } = e.target; 
                setFormData(prev => ({ 
                    ...prev, 
                    [name]: type === 'checkbox' ? (checked ? 1 : 0) : value 
                })); 
                setError(''); 
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.sekolah || !formData.rombel || !formData.jumlahSiswa || !formData.tuntas_literasi || !formData.tuntas_numerasi || !formData.namaGuru || !formData.namaKepsek) { 
                    setError('Mohon lengkapi semua field yang wajib diisi (termasuk nama guru dan kepsek).'); return; 
                }
                const siswa = Number(formData.jumlahSiswa);
                const lit = Number(formData.tuntas_literasi);
                const num = Number(formData.tuntas_numerasi);
                const kar1 = Number(formData.karakter_teratur || 0);
                const kar2 = Number(formData.karakter_pantang_menyerah || 0);
                const kar3 = Number(formData.karakter_mandiri || 0);

                if (siswa <= 0) { setError('Jumlah siswa harus lebih dari 0.'); return; }
                if (lit > siswa) { setError('Siswa Tuntas Literasi tidak boleh melebihi Total Siswa.'); return; }
                if (num > siswa) { setError('Siswa Tuntas Numerasi tidak boleh melebihi Total Siswa.'); return; }
                if (kar1 > siswa || kar2 > siswa || kar3 > siswa) {
                    setError('Pengisian jumlah siswa pada Target Karakter tidak boleh melebihi Total Siswa Rombel.'); return;
                }

                const submissionData = {
                    ...formData,
                    materi_literasi: MATERI_LITERASI[formData.kelas]?.[formData.triwulan] || "-",
                    materi_numerasi: MATERI_NUMERASI[formData.kelas]?.[formData.triwulan] || "-"
                };

                onSubmit(submissionData);
                
                setFormData(prev => ({
                    ...prev, rombel: '', jumlahSiswa: '', tuntas_literasi: '', tuntas_numerasi: '',
                    karakter_teratur: '', karakter_pantang_menyerah: '', karakter_mandiri: '',
                    tautan_bukti: '', catatan: '',
                    k_aman_1: 0, k_aman_2: 0, k_aman_3: 0, k_bineka_1: 0, k_bineka_2: 0, k_bineka_3: 0,
                    k_inklusif_1: 0, k_inklusif_2: 0, k_inklusif_3: 0, k_belajar_1: 0, k_belajar_2: 0, k_belajar_3: 0,
                    k_refleksi_1: 0, k_refleksi_2: 0, k_refleksi_3: 0, k_pimpin_1: 0, k_pimpin_2: 0, k_pimpin_3: 0
                }));
            };

            const getKinerjaCheckbox = (key, label) => (
                <label className="flex items-start gap-3 p-3 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer hover:bg-blue-50 transition-colors group">
                    <div className="relative flex items-center justify-center pt-1">
                        <input type="checkbox" name={key} checked={formData[key] === 1} onChange={handleChange} className="sr-only" />
                        <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${formData[key] === 1 ? 'bg-blue-600 border-blue-600' : 'bg-white border-slate-300 group-hover:border-blue-400'}`}>
                            {formData[key] === 1 && <i className="fas fa-check text-white text-[10px]"></i>}
                        </div>
                    </div>
                    <span className={`text-sm select-none flex-1 ${formData[key] === 1 ? 'text-blue-800 font-medium' : 'text-slate-600'}`}>{label}</span>
                </label>
            );

            return (
                <div className="max-w-5xl mx-auto bg-white rounded-xl border border-slate-200 shadow-sm p-4 md:p-8">
                <div className="mb-6 pb-4 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h2 className="text-lg md:text-xl font-bold text-slate-800 flex items-center gap-2"><i className="fas fa-edit text-blue-600"></i> Input Data Evaluasi Satuan Pendidikan</h2>
                        <p className="text-xs md:text-sm text-slate-500">Isi formulir secara lengkap dan jujur berdasarkan kondisi di lapangan.</p>
                    </div>
                </div>

                {error && <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg flex items-center gap-3"><i className="fas fa-exclamation-triangle flex-shrink-0"></i><p className="text-sm">{error}</p></div>}

                <form onSubmit={handleSubmit} className="space-y-10">
                    <section className="bg-slate-50/50 p-4 md:p-6 rounded-xl border border-slate-100">
                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-5 flex items-center gap-2 border-b pb-2"><i className="fas fa-school text-blue-500"></i> Identitas Sekolah & Rombel</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                            <InputGroup label="Tahun Ajaran"><input type="text" name="tahunAjaran" value={formData.tahunAjaran} onChange={handleChange} className="form-input font-semibold" /></InputGroup>
                            <InputGroup label="Nama Sekolah"><input type="text" name="sekolah" value={formData.sekolah} disabled className="form-input bg-slate-100 cursor-not-allowed text-slate-500" /></InputGroup>
                            <InputGroup label="Kecamatan"><input type="text" name="kecamatan" value={formData.kecamatan} disabled className="form-input bg-slate-100 cursor-not-allowed text-slate-500" /></InputGroup>
                            <InputGroup label="Nama Kepala Sekolah"><input type="text" name="namaKepsek" value={formData.namaKepsek} onChange={handleChange} className="form-input" placeholder="Nama Lengkap & Gelar" /></InputGroup>
                            <InputGroup label="Nama Guru Kelas"><input type="text" name="namaGuru" value={formData.namaGuru} onChange={handleChange} className="form-input" placeholder="Nama Lengkap & Gelar" /></InputGroup>
                            <InputGroup label="Jenjang"><select name="jenjang" value={formData.jenjang} onChange={handleChange} className="form-select">{JENJANG_LIST.map(j => <option key={j} value={j}>{j}</option>)}</select></InputGroup>
                            <InputGroup label="Triwulan"><select name="triwulan" value={formData.triwulan} onChange={handleChange} className="form-select font-semibold text-blue-700">{TRIWULAN_LIST.map(t => <option key={t} value={t}>{t}</option>)}</select></InputGroup>
                            <InputGroup label="Kelas"><select name="kelas" value={formData.kelas} onChange={handleChange} className="form-select font-semibold text-blue-700">{KELAS_LIST.map(k => <option key={k} value={k}>{k}</option>)}</select></InputGroup>
                            <InputGroup label="Rombongan Belajar"><input type="text" name="rombel" value={formData.rombel} onChange={handleChange} className="form-input" placeholder="Contoh: A / MIPA 1" /></InputGroup>
                            <InputGroup label="Total Siswa (Rombel)"><input type="number" name="jumlahSiswa" value={formData.jumlahSiswa} onChange={handleChange} className="form-input font-bold" min="1" /></InputGroup>
                        </div>
                    </section>

                    <section>
                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2 border-b pb-2"><i className="fas fa-tasks text-indigo-500"></i> Capaian Target Kinerja (Centang Jika "Ya")</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-2">
                                <p className="text-xs font-bold text-slate-500 bg-slate-100 p-2 rounded">Iklim Keamanan</p>
                                {getKinerjaCheckbox('k_aman_1', 'Semua siswa merasa aman di sekolah')}
                                {getKinerjaCheckbox('k_aman_2', 'Semua kasus kekerasan ditangani ≤ 3 hari')}
                                {getKinerjaCheckbox('k_aman_3', 'Sekolah memiliki peraturan/tata tertib untuk mewujudkan keamanan')}
                            </div>
                            <div className="space-y-2">
                                <p className="text-xs font-bold text-slate-500 bg-slate-100 p-2 rounded">Iklim Kebhinekaan</p>
                                {getKinerjaCheckbox('k_bineka_1', 'Semua siswa merasa dihargai dalam perbedaan')}
                                {getKinerjaCheckbox('k_bineka_2', 'Tidak ada diskriminasi yang tidak ditangani')}
                                {getKinerjaCheckbox('k_bineka_3', 'Praktik pembelajaran menghargai kebhinekaan')}
                            </div>
                            <div className="space-y-2">
                                <p className="text-xs font-bold text-slate-500 bg-slate-100 p-2 rounded">Iklim Inklusivitas</p>
                                {getKinerjaCheckbox('k_inklusif_1', 'Semua siswa berkebutuhan teridentifikasi')}
                                {getKinerjaCheckbox('k_inklusif_2', 'Guru melakukan adaptasi pembelajaran')}
                                {getKinerjaCheckbox('k_inklusif_3', 'Tidak ada siswa yang terabaikan dalam proses belajar')}
                            </div>
                            <div className="space-y-2">
                                <p className="text-xs font-bold text-slate-500 bg-slate-100 p-2 rounded">Kualitas Pembelajaran</p>
                                {getKinerjaCheckbox('k_belajar_1', 'Pembelajaran memenuhi standar aktif & bermakna')}
                                {getKinerjaCheckbox('k_belajar_2', 'Semua guru menggunakan asesmen formatif')}
                                {getKinerjaCheckbox('k_belajar_3', 'Ada peningkatan capaian belajar (literasi/numerasi) tiap triwulan')}
                            </div>
                            <div className="space-y-2">
                                <p className="text-xs font-bold text-slate-500 bg-slate-100 p-2 rounded">Refleksi Guru</p>
                                {getKinerjaCheckbox('k_refleksi_1', 'Setiap guru melakukan refleksi tiap triwulan')}
                                {getKinerjaCheckbox('k_refleksi_2', 'Setiap guru melakukan perbaikan nyata sebagai tindak lanjut refleksi')}
                                {getKinerjaCheckbox('k_refleksi_3', 'Ada perubahan praktik mengajar setiap guru')}
                            </div>
                            <div className="space-y-2">
                                <p className="text-xs font-bold text-slate-500 bg-slate-100 p-2 rounded">Kepemimpinan Instruksional</p>
                                {getKinerjaCheckbox('k_pimpin_1', 'Kepala sekolah aktif memantau pembelajaran di semua kelas')}
                                {getKinerjaCheckbox('k_pimpin_2', 'Supervisi berdampak pada perbaikan kinerja semua guru')}
                                {getKinerjaCheckbox('k_pimpin_3', 'Ada budaya belajar semua guru di sekolah')}
                            </div>
                        </div>
                    </section>

                    <section className="bg-blue-50/30 p-4 md:p-6 rounded-xl border border-blue-100">
                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2 border-b pb-2"><i className="fas fa-book-open text-blue-600"></i> Kemampuan Literasi & Numerasi</h3>
                        <p className="text-xs text-slate-500 mb-4">Materi menyesuaikan dengan Kelas dan Triwulan yang dipilih di atas.</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-white p-4 rounded-lg border border-blue-200 shadow-sm flex flex-col justify-between">
                                <div>
                                    <div className="flex items-center gap-2 mb-2"><i className="fas fa-book-reader text-blue-500"></i><span className="font-bold text-sm text-slate-700">Target Literasi</span></div>
                                    <p className="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100 min-h-[60px] italic">
                                        "{MATERI_LITERASI[formData.kelas]?.[formData.triwulan] || 'Materi tidak ditemukan untuk kombinasi ini.'}"
                                    </p>
                                </div>
                                <div className="mt-4 pt-4 border-t border-slate-100">
                                    <InputGroup label="Jumlah Siswa Tuntas Literasi">
                                        <input type="number" name="tuntas_literasi" value={formData.tuntas_literasi} onChange={handleChange} className="form-input border-blue-300 font-bold text-blue-700" placeholder="Contoh: 25" min="0" max={formData.jumlahSiswa || ""} />
                                    </InputGroup>
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-lg border border-indigo-200 shadow-sm flex flex-col justify-between">
                                <div>
                                    <div className="flex items-center gap-2 mb-2"><i className="fas fa-calculator text-indigo-500"></i><span className="font-bold text-sm text-slate-700">Target Numerasi</span></div>
                                    <p className="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100 min-h-[60px] italic">
                                        "{MATERI_NUMERASI[formData.kelas]?.[formData.triwulan] || 'Materi tidak ditemukan untuk kombinasi ini.'}"
                                    </p>
                                </div>
                                <div className="mt-4 pt-4 border-t border-slate-100">
                                    <InputGroup label="Jumlah Siswa Tuntas Numerasi">
                                        <input type="number" name="tuntas_numerasi" value={formData.tuntas_numerasi} onChange={handleChange} className="form-input border-indigo-300 font-bold text-indigo-700" placeholder="Contoh: 20" min="0" max={formData.jumlahSiswa || ""} />
                                    </InputGroup>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section>
                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2 border-b pb-2"><i className="fas fa-star text-amber-400"></i> Target Karakter Siswa</h3>
                        <div className="space-y-4">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-3 p-3 md:p-4 bg-white border border-slate-200 rounded-lg shadow-sm">
                                <p className="text-xs md:text-sm text-slate-700 flex-1 pr-4">Siswa menunjukkan kebiasaan belajar teratur (kehadiran, mengerjakan tugas, membawa perlengkapan, sungguh-sungguh)</p>
                                <div className="w-full md:w-48 flex items-center gap-2 flex-shrink-0">
                                    <input type="number" name="karakter_teratur" value={formData.karakter_teratur} onChange={handleChange} className="form-input text-sm font-bold" placeholder="Jml Siswa" min="0" max={formData.jumlahSiswa || ""} /> <span className="text-xs text-slate-500 font-bold">Orang</span>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-3 p-3 md:p-4 bg-white border border-slate-200 rounded-lg shadow-sm">
                                <p className="text-xs md:text-sm text-slate-700 flex-1 pr-4">Siswa tidak mudah menyerah saat belajar dan menghadapi soal literasi dan numerasi</p>
                                <div className="w-full md:w-48 flex items-center gap-2 flex-shrink-0">
                                    <input type="number" name="karakter_pantang_menyerah" value={formData.karakter_pantang_menyerah} onChange={handleChange} className="form-input text-sm font-bold" placeholder="Jml Siswa" min="0" max={formData.jumlahSiswa || ""} /> <span className="text-xs text-slate-500 font-bold">Orang</span>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-3 p-3 md:p-4 bg-white border border-slate-200 rounded-lg shadow-sm">
                                <p className="text-xs md:text-sm text-slate-700 flex-1 pr-4">Siswa mampu menyelesaikan tugas literasi dan numerasi secara mandiri</p>
                                <div className="w-full md:w-48 flex items-center gap-2 flex-shrink-0">
                                    <input type="number" name="karakter_mandiri" value={formData.karakter_mandiri} onChange={handleChange} className="form-input text-sm font-bold" placeholder="Jml Siswa" min="0" max={formData.jumlahSiswa || ""} /> <span className="text-xs text-slate-500 font-bold">Orang</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-200">
                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2 border-b pb-2"><i className="fas fa-folder-open text-emerald-600"></i> Bukti Dukung & Tindak Lanjut</h3>
                        <div className="space-y-4">
                            <InputGroup label="Tautan / Link Bukti Dukung (Google Drive, dll)">
                                <input 
                                    type="url" 
                                    name="tautan_bukti" 
                                    value={formData.tautan_bukti} 
                                    onChange={handleChange} 
                                    className="form-input text-blue-600 underline" 
                                    placeholder="https://drive.google.com/..." 
                                />
                            </InputGroup>
                            <InputGroup label="Catatan Evaluasi / Rencana Tindak Lanjut">
                                <textarea name="catatan" value={formData.catatan} onChange={handleChange} className="form-input" rows="3" placeholder="Masukkan catatan hasil evaluasi..."></textarea>
                            </InputGroup>
                        </div>
                    </section>

                    <div className="pt-2 border-t border-slate-200 flex justify-end pb-8">
                    <button type="submit" className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-10 py-3.5 rounded-xl font-bold shadow-lg transition-transform hover:-translate-y-1 flex items-center justify-center gap-2">
                        <i className="fas fa-paper-plane"></i> Kirim Data Rombel
                    </button>
                    </div>
                </form>
                </div>
            );
        }

        function InputGroup({ label, children }) {
            return (
                <div className="flex flex-col gap-1.5">
                <label className="text-xs font-semibold text-slate-600">{label}</label>
                <style>{`
                    .form-input, .form-select { width: 100%; padding: 0.6rem 0.75rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; background-color: #f8fafc; font-size: 0.875rem; transition: border-color 0.2s; }
                    .form-input:focus, .form-select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; background-color: #fff; }
                `}</style>
                {children}
                </div>
            );
        }

        function Monitoring({ records, onDelete, user, thresholds, npsnDB }) {
            const [filterKec, setFilterKec] = useState('Semua');
            const [filterWaktu, setFilterWaktu] = useState('Semua');
            const [filterJenjang, setFilterJenjang] = useState('Semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [expandedSchool, setExpandedSchool] = useState(null);
            
            const [subTab, setSubTab] = useState(user?.role === 'dinas' ? 'progres' : 'rekap');

            const progressData = useMemo(() => {
                if (user?.role !== 'dinas') return []; 

                const totalPerKec = {};
                Object.values(npsnDB).forEach(school => {
                    if (school.kecamatan) totalPerKec[school.kecamatan] = (totalPerKec[school.kecamatan] || 0) + 1;
                });

                const inputtedPerKec = {};
                const uniqueSchools = new Set();
                records.forEach(r => {
                    const key = `${r.kecamatan}-${r.sekolah}`;
                    if (!uniqueSchools.has(key)) {
                        uniqueSchools.add(key);
                        inputtedPerKec[r.kecamatan] = (inputtedPerKec[r.kecamatan] || 0) + 1;
                    }
                });

                return KECAMATAN_LIST.map(kec => {
                    const total = totalPerKec[kec] || 0;
                    const inputted = inputtedPerKec[kec] || 0;
                    const sisa = total - inputted; 
                    const pct = total > 0 ? Math.round((inputted / total) * 100) : 0;
                    return { name: kec, Total: total, Mengisi: inputted, Sisa: sisa, Persentase: pct };
                }).filter(d => d.Total > 0);
            }, [records, npsnDB, user]);

            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    const data = payload[0].payload;
                    return (
                        <div className="bg-white p-3 border border-slate-200 shadow-md rounded-lg text-xs z-50">
                            <p className="font-bold text-slate-800 mb-1">{label}</p>
                            <p className="text-slate-500">Total Sekolah: <b>{data.Total}</b></p>
                            <p className="text-blue-600">Sudah Mengisi: <b>{data.Mengisi}</b></p>
                            <p className="text-emerald-600 mt-1 font-bold">Progress: {data.Persentase}%</p>
                        </div>
                    );
                }
                return null;
            };

            const filteredData = useMemo(() => {
                return records.filter(r => {
                    const matchKec = filterKec === 'Semua' || r.kecamatan === filterKec;
                    const matchWaktu = filterWaktu === 'Semua' || r.triwulan === filterWaktu;
                    const matchJenjang = filterJenjang === 'Semua' || r.jenjang === filterJenjang;
                    const matchSearch = r.sekolah.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchKec && matchWaktu && matchJenjang && matchSearch;
                });
            }, [records, filterKec, filterWaktu, filterJenjang, searchQuery]);

            const groupedData = useMemo(() => {
                const groups = {};
                filteredData.forEach(r => {
                    if (!groups[r.sekolah]) {
                        groups[r.sekolah] = { sekolah: r.sekolah, kecamatan: r.kecamatan, jenjang: r.jenjang, records: [], totalSiswa: 0, _uniqueRombels: {} };
                    }
                    groups[r.sekolah].records.push(r);
                    
                    const rombelKey = `${r.kelas}-${r.rombel}`.toLowerCase().replace(/\s+/g, '');
                    groups[r.sekolah]._uniqueRombels[rombelKey] = Number(r.jumlahSiswa) || 0;
                });
                
                return Object.values(groups).map(g => {
                    const totalSiswaReal = Object.values(g._uniqueRombels).reduce((a,b)=>a+b, 0);
                    return { ...g, totalSiswa: totalSiswaReal };
                }).sort((a, b) => a.sekolah.localeCompare(b.sekolah));
            }, [filteredData]);

            const calculateMetrics = (row) => {
                const litRaw = Number(row.tuntas_literasi || row.capaiLiterasi || 0);
                const numRaw = Number(row.tuntas_numerasi || row.capaiNumerasi || 0);
                const litPct = Math.round((litRaw / Number(row.jumlahSiswa)) * 100) || 0;
                const numPct = Math.round((numRaw / Number(row.jumlahSiswa)) * 100) || 0;
                
                const karRaw = Number(row.karakter_teratur || 0) + Number(row.karakter_pantang_menyerah || 0) + Number(row.karakter_mandiri || 0);
                const karPct = Math.round((karRaw / (Number(row.jumlahSiswa) * 3)) * 100) || 0;

                const secScore = Number(row.k_aman_1||0) + Number(row.k_aman_2||0) + Number(row.k_aman_3||0) || Number(row.keamanan||0);
                const divScore = Number(row.k_bineka_1||0) + Number(row.k_bineka_2||0) + Number(row.k_bineka_3||0) || Number(row.kebinekaan||0);
                const incScore = Number(row.k_inklusif_1||0) + Number(row.k_inklusif_2||0) + Number(row.k_inklusif_3||0) || Number(row.inklusivitas||0);
                
                const belScore = Number(row.k_belajar_1||0) + Number(row.k_belajar_2||0) + Number(row.k_belajar_3||0);
                const refScore = Number(row.k_refleksi_1||0) + Number(row.k_refleksi_2||0) + Number(row.k_refleksi_3||0);
                const pimScore = Number(row.k_pimpin_1||0) + Number(row.k_pimpin_2||0) + Number(row.k_pimpin_3||0);

                const secPct = Math.round((secScore / 3) * 100) || 0;
                const divPct = Math.round((divScore / 3) * 100) || 0;
                const incPct = Math.round((incScore / 3) * 100) || 0;
                const belPct = Math.round((belScore / 3) * 100) || 0;
                const refPct = Math.round((refScore / 3) * 100) || 0;
                const pimPct = Math.round((pimScore / 3) * 100) || 0;

                const avgPct = (litPct + numPct + karPct) / 3;
                const avgIklim = (secScore + divScore + incScore + belScore + refScore + pimScore) / 6;

                let kategori = '🔴', tindakLanjut = 'Perlu Intervensi Segera';
                if (avgPct >= thresholds.pctTinggi && avgIklim >= thresholds.iklimTinggi) { kategori = '⭐⭐⭐'; tindakLanjut = 'Pertahankan Kinerja'; }
                else if (avgPct >= thresholds.pctSedang || avgIklim >= thresholds.iklimSedang) { kategori = '⭐⭐'; tindakLanjut = 'Bimbingan Lanjutan'; }
                
                return { 
                    litPct, numPct, karPct, secScore, divScore, incScore, belScore, refScore, pimScore, 
                    secPct, divPct, incPct, belPct, refPct, pimPct,
                    kategori, tindakLanjut, litRaw, numRaw, karRaw 
                };
            };

            const toggleSchool = (sekolah) => {
                if (expandedSchool === sekolah) setExpandedSchool(null);
                else setExpandedSchool(sekolah);
            };

            return (
                <div className="flex flex-col h-full space-y-4">
                    
                    {user?.role === 'dinas' && (
                        <div className="flex gap-2 flex-shrink-0">
                            <button 
                                onClick={() => setSubTab('progres')} 
                                className={`flex-1 py-3 px-4 rounded-xl font-bold text-xs md:text-sm transition-all shadow-sm border ${subTab === 'progres' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                            >
                                <i className="fas fa-chart-bar mr-1 md:mr-2"></i> Progres Input Data
                            </button>
                            <button 
                                onClick={() => setSubTab('rekap')} 
                                className={`flex-1 py-3 px-4 rounded-xl font-bold text-xs md:text-sm transition-all shadow-sm border ${subTab === 'rekap' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                            >
                                <i className="fas fa-list mr-1 md:mr-2"></i> Rekapitulasi Rombel
                            </button>
                        </div>
                    )}

                    {subTab === 'progres' && user?.role === 'dinas' && (
                        <div className="p-4 md:p-5 border border-slate-200 bg-white rounded-xl shadow-sm flex-1 flex flex-col min-h-0">
                            <h2 className="text-base md:text-lg font-bold text-slate-800 flex items-center gap-2 mb-4 flex-shrink-0">
                                <i className="fas fa-chart-bar text-blue-600"></i> Progres Input Data per Kecamatan
                            </h2>
                            {progressData.length > 0 ? (
                                <div className="flex-1 overflow-x-auto no-scrollbar w-full">
                                    <div className="h-full min-h-[300px] min-w-[450px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={progressData} margin={{ top: 10, right: 10, left: -20, bottom: 40 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0"/>
                                                <XAxis dataKey="name" tick={{fill: '#64748b', fontSize: 10}} angle={-45} textAnchor="end" />
                                                <YAxis tick={{fill: '#64748b', fontSize: 10}} allowDecimals={false} />
                                                <RechartsTooltip content={<CustomTooltip />} cursor={{fill: '#f1f5f9'}} />
                                                <Legend 
                                                    wrapperStyle={{fontSize: '12px'}} 
                                                    verticalAlign="top" 
                                                    height={36} 
                                                    payload={[
                                                        { value: 'Sudah Mengisi (Biru)', type: 'square', id: 'mengisi', color: '#3b82f6' },
                                                        { value: 'Belum Mengisi (Silver)', type: 'square', id: 'sisa', color: '#cbd5e1' }
                                                    ]}
                                                />
                                                <Bar dataKey="Mengisi" stackId="a" fill="#3b82f6" />
                                                <Bar dataKey="Sisa" stackId="a" fill="#cbd5e1" radius={[4, 4, 0, 0]} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-center text-xs text-slate-500 py-8">
                                    Belum ada target data sekolah. Pastikan NPSN sudah didaftarkan.
                                </div>
                            )}
                        </div>
                    )}

                    {subTab === 'rekap' && (
                        <>
                            <div className="flex-shrink-0 p-4 md:p-5 border border-slate-200 bg-white rounded-xl shadow-sm">
                                <div className="flex flex-col gap-3 md:gap-4">
                                    <h2 className="text-base md:text-lg font-bold text-slate-800 flex items-center gap-2">
                                        <i className="fas fa-list text-blue-600"></i> Rekapitulasi Rombel Sekolah
                                    </h2>
                                    
                                    <div className="flex flex-col md:flex-row gap-3 w-full">
                                        <div className="relative flex-1">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
